<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Q4 Seatwork 1</title>
    <style>
        body {
            color:white;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            background-image: url('flowers.jpg');
            background-repeat: no-repeat;
            background-size: cover;
        }
    </style>
</head>
<body>
    <div style="border: 0px solid #ffffff; background: #242e54; margin: 200px; border-radius: 10px; padding:50px;">
        <h1 style="text-align: center;"><b>Login</b></h1><br>
        <form>
            <label style="border-radius: 5px; background: #4558a4; padding: 5px;">Username</label><br>
            <input type="text" id="user" class="form-control" placeholder="Enter user" style="border: #4558a4;"><br><br>
            <label style="border-radius: 5px; background: #4558a4; padding: 5px;">Password</label><br>
            <input type="password" id="pass" class="form-control" placeholder="Enter password" style="border: #4558a4;"><br>
            <input type="checkbox" id="save" onchange="text_appear()"> Save this for next time?
            <div id="output"></div>
            <br><br>
            <div class="d-flex justify-content-center">
                <input type="button" class="btn btn-success" value="Enter" onclick="password_verification()" style="font-size: 25px;">
            </div>
            <p><u>Forgot username/password?</u></p>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
